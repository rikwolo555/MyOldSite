    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-secondary: #64748b;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        h1 { text-align: center; color: #0f172a; margin-bottom: 30px; }

        /* Панель фильтров */
        .filter-panel {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            background: white;
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        /* Сетка */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .player-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }

        .player-container.hidden { display: none; }

        .custom-controls {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
        }

        .top-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }

        .play-pause-btn {
            background: var(--primary-color);
            color: white; border: none;
            width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer;
        }

        .progress-area { flex-grow: 1; height: 6px; background: #cbd5e1; border-radius: 10px; cursor: pointer; }
        .progress-bar { height: 100%; width: 0%; background: var(--primary-color); border-radius: 10px; }

        .fav-btn {
            width: 100%; background: transparent;
            border: 2px solid #e2e8f0; padding: 10px;
            border-radius: 10px; font-weight: 600; cursor: pointer;
        }

        .fav-btn.active { background: #fee2e2; border-color: #ef4444; color: #ef4444; }
    </style>
</head>

    <script>
    const RECENT_KEY = 'recent_played';

    document.querySelectorAll('.player-container').forEach(container => {
        const audio = container.querySelector('.audio-element');
        const playBtn = container.querySelector('.play-pause-btn');
        const progressBar = container.querySelector('.progress-bar');
        const progressArea = container.querySelector('.progress-area');
        const trackId = container.getAttribute('data-id');
        const favBtn = container.querySelector('.fav-btn');

        // Загрузка избранного при старте
        if (localStorage.getItem(trackId) === 'active') {
            favBtn.classList.add('active');
            favBtn.innerText = "❤️ Избранное";
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                document.querySelectorAll('audio').forEach(el => el.pause());
                document.querySelectorAll('.play-pause-btn').forEach(el => el.innerText = "▶");
                audio.play();
                playBtn.innerText = "⏸";
                
                // ВАЖНО: Записываем в историю сразу при клике
                addToRecent(trackId); 
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        });

        audio.ontimeupdate = () => {
            if (audio.duration) {
                progressBar.style.width = (audio.currentTime / audio.duration) * 100 + "%";
            }
        };

        progressArea.onclick = (e) => {
            audio.currentTime = (e.offsetX / progressArea.clientWidth) * audio.duration;
        };
    });

    function toggleFav(btn) {
        const id = btn.closest('.player-container').getAttribute('data-id');
        btn.classList.toggle('active');
        if (btn.classList.contains('active')) {
            btn.innerText = "❤️ Избранное";
            localStorage.setItem(id, 'active');
        } else {
            btn.innerText = "❤ В избранное";
            localStorage.removeItem(id);
        }
    }

    function addToRecent(id) {
        let recent = JSON.parse(localStorage.getItem(RECENT_KEY)) || [];
        // Удаляем если уже был, чтобы поднять в начало
        recent = recent.filter(item => item !== id); 
        recent.unshift(id); 
        if (recent.length > 12) recent.pop(); // Храним чуть больше
        localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
        console.log("История обновлена:", recent);
    }

    function filterTracks(type, btn) {
        // Управляем кнопками фильтров
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const grid = document.querySelector('.main-grid');
        const cards = Array.from(document.querySelectorAll('.player-container'));
        const recentList = JSON.parse(localStorage.getItem(RECENT_KEY)) || [];
        
        cards.forEach(card => {
            const id = card.getAttribute('data-id');
            card.classList.remove('hidden'); // Сначала всё показываем
            card.style.order = "0"; // Сбрасываем порядок

            if (type === 'fav') {
                if (!card.querySelector('.fav-btn').classList.contains('active')) {
                    card.classList.add('hidden');
                }
            } else if (type === 'recent') {
                if (!recentList.includes(id)) {
                    card.classList.add('hidden');
                } else {
                    // СОРТИРОВКА: ставим последние прослушанные в начало
                    card.style.order = recentList.indexOf(id);
                }
            }
        });
        
        // Включаем flex-order для сетки (нужно для работы style.order)
        grid.style.display = (type === 'recent') ? 'flex' : 'grid';
        grid.style.flexWrap = 'wrap';
    }
    </script>
