<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musiqiy sahifa</title>
    <style>
        /* Общий стиль в духе Alif Shop */
        body {
            background-color: #f8fafc; /* Светлый приятный фон */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: #334155;
        }

        h1 {
            text-align: center;
            color: #0f172a;
            font-weight: 700;
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        /* Сетка для карточек (Grid) */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Карточка трека */
        .player-container {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .player-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6; /* Синий акцент как у Alif */
        }

        /* Иконка или обложка */
        .track-icon {
            background: #f1f5f9;
            height: 140px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 15px;
        }

        .player-container h3 {
            margin: 10px 0 5px 0;
            font-size: 1.1rem;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-container p {
            margin: 0 0 15px 0;
            color: #64748b;
            font-size: 0.9rem;
        }

        /* Стиль плеера */
        audio {
            width: 100%;
            height: 35px;
            border-radius: 8px;
            outline: none;
        }

        /* Кнопка "Слушать" (как в Alif Shop) */
        .buy-button {
            margin-top: 15px;
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .buy-button:hover {
            background-color: #2563eb;
        }

    </style>
</head>
<body>

    <h1>Musiqiy sahifa</h1>

    <div class="main-grid">

        <div class="player-container">
            <div class="track-icon">🎵</div>
            <h3>Fendi</h3>
            <p>Rakhim</p>
            <audio controls>
                <source src="../mp3/Rakhim_-_Fendi.mp3" type="audio/mpeg">
                Ваш браузер не поддерживает аудио.
            </audio>
            <button class="buy-button">Добавить в избранное</button>
        </div>

        <div class="player-container">
            <div class="track-icon">🎧</div>
            <h3>Mortals (slowed)</h3>
            <p>Warriyo</p>
            <audio controls>
                <source src="../mp3.2/Warriyo - Mortals (ft. Laura Brehm) (Slowed).mp3" type="audio/mpeg">
            </audio>
            <button class="buy-button">Добавить в избранное</button>
        </div>

        <div class="player-container">
            <div class="track-icon">✨</div>
            <h3>Mortals (funk)</h3>
            <p>Исполнитель</p>
            <audio controls>
                <source src="../mp3.2/Warriyo - Mortals (Funk (Slowed)) (1).mp3" type="audio/mpeg">
            </audio>
            <button class="buy-button">Добавить в избранное</button>
        </div>

        <div class="player-container">
            <div class="track-icon">🔥</div>
            <h3>Bass Da Da Da</h3>
            <p>Nikola Ryback</p>
            <audio controls>
                <source src="../mp3.2/Nikola Ryback - Bass Da Da Da (Slowed).mp3" type="audio/mpeg">
            </audio>
            <button class="buy-button">Добавить в избранное</button>
        </div>

    </div>

</body>
</html>
