<!DOCTYPE html>
<html>
    <head>
        <style>
               body{
                   background:#111;
                   min-height:100vh;
                   display:flex;
                   flex-direction:column;
                   align-items:center;
                   color:white; 
                   font-family:'segoe ui',tahoma,geneva,verdana,sans-serif;
               }
               h1{
                text-align: center;
            } 
              button{
                padding: 10px;
                margin: 10px;
                  
                border-radius: 80px;
                background: #111;
                
                 color: #444;
                 cursor: pointer;
            }
            a{
                cursor: default;
            }

            /* Контейнер плеера */
.player-container {
    background: #222; /* Темный фон как на скрине */
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 20px;
}

/* Стили кнопок */
/* Измени эти строки в блоке .play-btn, .pause-btn */
            .play-btn, .pause-btn{
width: 45px;
height: 45px;
padding: 0;
display: flex;
align-items: center;
justify-content: center;
border-radius: 50%; /* Идеальный круг */
            }
.play-btn:hover { background: black; }

.pause-btn:hover { background: black; }
            

/* Полоска прогресса */
.progress-bg {
    flex-grow: 1;
    height: 8px;
    background: #1a1a1a;
    border-radius: 4px;
    margin-left: 10px;
    position: relative;
    align-self: center;
}

.progress-fill {
    width: 50%; /* Будет расти при проигрывании */
    height: 100%;
    background: #007aff; /* Синий цвет акцента */
    border-radius: 4px;
}

.controls-row {
    display: flex;
    align-items: center;
    margin-top: 10px;
}

                  .player-container p {
                font-size:14px;
                opacity:0.7;
                margin-bottom:5px;
            }

    .player-container h3 {
        margin-top: 0;
        font-size: 18px;
    }

    audio {
        width: 100%;
        height: 40px;
        margin-top:10px;
        opacity:0.8; /*чтобы он не слишком выделялся*/
        filter:sepia(20%)  brightness(1.2); /* просто немного подсветим */
    }

        </style>
    </head>
    <body>
        <h1>Musiqiy sahifa</h1>

        <div class="player-container">
    <h3>🎵 Никотин</h3>
    <p>Ганвест</p>
    
    <div class="custom-audio-wrapper">
        <audio id="audio1">
            <source src="../mp3.2/Ганвест - Никотин (Offical video).mp3">
        </audio>
        
        <div class="controls-row">
            <button onclick="document.getElementById('audio1').play()" class="play-btn">▶</button>
            <button onclick="document.getElementById('audio1').pause()" class="pause-btn">||</button>
              <div class="progress-bg" style="flex-grow: 1; height: 8px; background: rgba(255,255,255,0.1); margin-left: 10px; border-radius: 4px; position: relative;">
    <div id="progress1" class="progress-fill" style="width: 50%; height: 100%; background: #007aff; border-radius: 4px;"></div>
</div> 
        </div>
        </div>
    </div>
</div>

        <script>
    const audio = document.getElementById('audio1');
    const progressBar = document.getElementById('progress1');

    // Эта функция заставляет синюю полоску расти
     audio.ontimeupdate = function() {
    if (audio.duration) {
        const percentage = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = percentage + '%';
    }
};
