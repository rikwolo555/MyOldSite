<!DOCTYPE html>

    <head>
        <style>
               body{
                   background:#111;
                   min-height:100vh;
                   display:flex;
                   flex-direction:column;
                   align-items:center;
                   color:white; 
                   font-family:'segoe ui',tahoma,geneva,verdana,sans-serif;
               }
               h1{
                text-align: center;
            } 
              button{
                padding: 10px;
                margin: 10px;
                border-radius: 80px;
                background: #111;
                
                 color: #444;
                 cursor: pointer;
            }
            a{
                cursor: default;
            }

         .player-container:hover{
             background:rgba(255,255,255,0.12); /*чуть больше яркости*/
             transform:translateY(-5px); /*слегка приподнимается*/
             box-shadow:0 15px 35px rgba(0,0,0,0.5);
         }   

          
    .player-container {

        transition:all 0.3s ease ; /*плавность*/
        
        background:#222; /* то самое размытие фона */

       -webkit-backdrop-filter:blur(10px);  /*поддержка для Safari*/
        border:1px solid rgba(255,255,255,0.1); /*тонкая светлая рамка*/ 
        
        padding: 20px;
        border-radius: 20px; /*сделаем углы чуть более округлыми*/
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        width: 350px;
        margin: 20px auto;
        text-align: center;
        
        color: white;
        font-family: Arial, sans-serif;
    }

            .player-container p {
                font-size:14px;
                opacity:0.7;
                margin-bottom:5px;
            }

    .player-container h3 {
        margin-top: 0;
        font-size: 18px;
    }

    audio {
        width: 100%;
        height: 40px;
        margin-top:10px;
        opacity:0.8; /*чтобы он не слишком выделялся*/
        filter:sepia(20%)  brightness(1.2); /* просто немного подсветим */
    }

        </style>
