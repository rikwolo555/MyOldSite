<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musiqiy sahifa — Premium</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-secondary: #64748b;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #0f172a;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .player-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .player-container:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .track-info h3 { margin: 0; font-size: 1.25rem; }
        .track-info p { margin: 4px 0 20px 0; color: var(--text-secondary); font-size: 0.9rem; }

        .custom-controls {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .top-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }

        .play-pause-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center; justify-content: center;
        }

        .progress-area {
            flex-grow: 1;
            height: 6px;
            background: #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary-color);
            border-radius: 10px;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .fav-btn {
            width: 100%;
            background: transparent;
            border: 2px solid #e2e8f0;
            color: var(--text-main);
            padding: 10px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .fav-btn.active {
            background: #fee2e2;
            border-color: #ef4444;
            color: #ef4444;
        }
    </style>
</head>
<body>

    <h1>Musiqiy sahifa</h1>

    <div class="main-grid">
        <div class="player-container" data-id="track_1">
            <div class="track-info">
                <h3>Fendi</h3>
                <p>Rakhim</p>
            </div>
            <div class="custom-controls">
                <audio class="audio-element"><source src="../mp3/Rakhim_-_Fendi.mp3" type="audio/mpeg"></audio>
                <div class="top-row">
                    <button class="play-pause-btn">▶</button>
                    <div class="progress-area"><div class="progress-bar"></div></div>
                </div>
                <div class="time-display"><span class="current">0:00</span><span class="duration">0:00</span></div>
            </div>
            <button class="fav-btn" onclick="toggleFav(this)">❤ В избранное</button>
        </div>

        <div class="player-container" data-id="track_2">
            <div class="track-info">
                <h3>Mortals (slowed)</h3>
                <p>Warriyo</p>
            </div>
            <div class="custom-controls">
                <audio class="audio-element"><source src="../mp3.2/Warriyo - Mortals (ft. Laura Brehm) (Slowed).mp3" type="audio/mpeg"></audio>
                <div class="top-row">
                    <button class="play-pause-btn">▶</button>
                    <div class="progress-area"><div class="progress-bar"></div></div>
                </div>
                <div class="time-display"><span class="current">0:00</span><span class="duration">0:00</span></div>
            </div>
            <button class="fav-btn" onclick="toggleFav(this)">❤ В избранное</button>
        </div>
    </div>

    <script>
        // 1. Инициализация плееров
        document.querySelectorAll('.player-container').forEach(container => {
            const audio = container.querySelector('.audio-element');
            const playBtn = container.querySelector('.play-pause-btn');
            const progressBar = container.querySelector('.progress-bar');
            const progressArea = container.querySelector('.progress-area');
            const currentTxt = container.querySelector('.current');
            const durationTxt = container.querySelector('.duration');
            const trackId = container.getAttribute('data-id');
            const favBtn = container.querySelector('.fav-btn');

            // Проверка избранного при загрузке
            if (localStorage.getItem(trackId) === 'active') {
                favBtn.classList.add('active');
                favBtn.innerText = "❤️ Избранное";
            }

            playBtn.addEventListener('click', () => {
                if (audio.paused) {
                    document.querySelectorAll('audio').forEach(el => el.pause());
                    document.querySelectorAll('.play-pause-btn').forEach(el => el.innerText = "▶");
                    audio.play();
                    playBtn.innerText = "⏸";
                } else {
                    audio.pause();
                    playBtn.innerText = "▶";
                }
            });

            audio.addEventListener('timeupdate', () => {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + "%";
                currentTxt.innerText = formatTime(audio.currentTime);
            });

            audio.addEventListener('loadedmetadata', () => {
                durationTxt.innerText = formatTime(audio.duration);
            });

            progressArea.addEventListener('click', (e) => {
                audio.currentTime = (e.offsetX / progressArea.clientWidth) * audio.duration;
            });
        });

        function formatTime(seconds) {
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }

        // 2. Логика сохранения в память
        function toggleFav(btn) {
            const container = btn.closest('.player-container');
            const trackId = container.getAttribute('data-id');
            
            btn.classList.toggle('active');
            
            if (btn.classList.contains('active')) {
                btn.innerText = "❤️ Избранное";
                localStorage.setItem(trackId, 'active'); // Сохраняем
            } else {
                btn.innerText = "❤ В избранное";
                localStorage.removeItem(trackId); // Удаляем
            }
        }
    </script>
</body>
    </html>
